<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: sans-serif;
        padding: 10px;
      }
      button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 8px;
      }
      label {
        display: block;
        margin-top: 10px;
        font-size: 12px;
      }
      select,
      input {
        width: 100%;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Omnisafe</h1>

    <button id="drawBtn">Draw Safe Zone</button>
    <button id="generateReviewBtn">Generate Review Workspace</button>
    <button id="checkBtn">Check Safety</button>

    <hr />

    <button id="tiktokBtn">Apply TikTok Overlay</button>
    <button id="ytBtn">Apply YouTube Overlay</button>
    <button id="instaBtn">Apply Instagram Overlay</button>

    <hr />

    <label for="captionSlider">Caption Height:</label>
    <input type="range" id="captionSlider" min="0" max="500" value="0" />

    <label for="deviceSelect">Device Ratio:</label>
    <select id="deviceSelect">
      <option value="19.5">iPhone 15/16 Pro</option>
      <option value="21">Galaxy Ultra</option>
      <option value="16">Standard 9:16</option>
    </select>

    <script src="main.js"></script>
  </body>
</html>
